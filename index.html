<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📑 pojoksoal.me</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts Loaders -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link id="dynamicFontLink" href="https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;500;600;700;800&family=Lexend:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- QR Code Generator & Scanner Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --primary-font: 'Plus Jakarta Sans', sans-serif;
        }
        body { font-family: var(--primary-font); }
        .arabic { font-family: 'Amiri', serif; font-size: 1.35rem; }
        
        /* Custom Styling khusus Gambar Lembar Soal */
        .question-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1rem 0;
            width: 100%;
        }
        .question-image {
            max-width: 100%;
            height: auto;
            border-radius: 0.75rem;
            border: 1px solid #ffe4e6;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            object-fit: contain;
        }
    </style>

    <!-- SCRIPT PRE-RENDER DINI -->
    <script>
        (function applyCachedFontEarly() {
            try {
                const cachedConfig = localStorage.getItem("headerConfig_cache");
                if (cachedConfig) {
                    const data = JSON.parse(cachedConfig);
                    if (data.themeFont) {
                        document.documentElement.style.setProperty('--primary-font', `'${data.themeFont}', sans-serif`);
                    }
                }
            } catch (e) { console.log(e); }
        })();
    </script>
</head>
<body id="appBody" class="bg-rose-50/40 text-gray-700 min-h-screen transition-colors duration-300">

    <!-- NAVBAR TOP -->
    <nav id="appNavbar" class="bg-white border-b border-rose-100 shadow-xs px-4 py-3 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-xl">✨</span>
                <span id="navBarTitle" class="font-bold text-gray-800 text-sm md:text-base">Daarunnisaa</span>
            </div>
            <div id="navRight">
                <button onclick="toggleLoginModal(true)" id="btnLoginView" class="theme-btn-sec bg-rose-100 hover:bg-rose-200 text-rose-700 text-xs font-semibold px-4 py-2 rounded-xl transition-all cursor-pointer">
                    Login
                </button>
            </div>
        </div>
    </nav>

    <!-- CONTAINER HALAMAN MAHASISWI (KUIS) -->
    <div id="studentView" class="block">
        <header id="appHeader" class="bg-white border-b border-rose-100 shadow-xs relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-rose-100 rounded-full opacity-50 blur-xl"></div>
            <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-amber-100 rounded-full opacity-40 blur-lg"></div>
            
            <div class="max-w-3xl mx-auto px-4 py-8 text-center relative z-10">
                <span id="headerSubtitleDisplay" class="text-xs font-bold text-rose-500 uppercase tracking-widest bg-rose-50 px-3 py-1 rounded-full">EVALUASI TAJWID METODE ASY-SYAFI'I ✨</span>
                <h1 id="displayMainTitle" class="text-2xl md:text-3xl font-bold text-gray-850 mt-3 tracking-wide">Lembar Soal Digital</h1>
                <p id="displaySheetTitle" class="text-xs font-semibold text-gray-500 mt-1 uppercase tracking-wider hidden"></p>
                <p id="headerQuoteDisplay" class="text-xs md:text-sm text-rose-600/80 italic mt-2 font-medium">
                    "Bersungguh-sungguhlah pada hal yang bermanfaat bagimu dan mintalah pertolongan Allah" (Al-Hadits)
                </p>
            </div>
        </header>

        <main class="max-w-3xl mx-auto px-4 py-8">
            <form id="quizForm" class="space-y-6">
                <!-- AKSES TOKEN & INFORMASI MAHASISWI -->
                <div id="panelStudentInfo" class="theme-panel bg-white p-6 rounded-2xl shadow-xs border border-rose-100/60 space-y-4">
                    <h3 id="lblExamPageTitle" class="text-sm font-bold text-gray-800 uppercase tracking-wider border-b border-rose-50 pb-2">LAMAN UJIAN</h3>
                    
                    <div>
                        <label class="block text-xs font-semibold text-rose-600 uppercase mb-1">SCAN QR CODE / MASUKKAN KODE TOKEN SOAL</label>
                        <div class="flex gap-2">
                            <input type="text" id="inputTopicToken" placeholder="KETIK KODE TOKEN UJIAN..." class="w-full px-4 py-2.5 border border-rose-200 rounded-xl text-xs sm:text-sm uppercase font-mono font-bold text-rose-600 bg-rose-50/10 focus:outline-none focus:border-rose-400">
                            <button type="button" id="btnOpenQuiz" onclick="window.verifyAndLoadQuiz()" class="theme-btn-pri bg-rose-500 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition-all cursor-pointer whitespace-nowrap">
                                Buka Soal
                            </button>
                        </div>
                    </div>

                    <div id="studentIdentityPanel" class="hidden transition-all duration-300 bg-rose-50/30 p-4 rounded-xl border border-rose-100 space-y-2">
                        <label class="block text-xs font-semibold text-gray-600 uppercase mb-1">Identitas Mahasiswi: Nama Lengkap & NIM</label>
                        <input type="text" id="studentName" required placeholder="Masukkan nama dan nomor induk mahasiswi..." class="w-full px-4 py-2.5 border border-rose-200 rounded-xl text-sm focus:outline-none focus:border-rose-400 bg-white">
                    </div>
                </div>

                <!-- CONTAINER WADAH SOAL -->
                <div id="studentQuestionsWrapper" class="hidden space-y-6">
                    <div id="studentPgSection" class="space-y-4">
                        <h2 class="text-xs font-bold text-rose-600 uppercase tracking-widest pl-2">Bagian I: Pilihan Ganda</h2>
                        <div id="pgContainer" class="space-y-4"></div>
                    </div>

                    <div id="studentEssaySection" class="space-y-4">
                        <h2 class="text-xs font-bold text-rose-600 uppercase tracking-widest pl-2 mt-8">Bagian II: Uraian / Esai</h2>
                        <div id="essayContainer" class="space-y-4"></div>
                    </div>

                    <div class="pt-4 text-center">
                        <button type="submit" id="btnSubmitQuiz" class="theme-btn-pri bg-gradient-to-r from-rose-400 to-pink-500 hover:from-rose-500 hover:to-pink-600 text-white font-semibold px-8 py-3.5 rounded-xl text-sm transition-all shadow-md transform hover:-translate-y-0.5 cursor-pointer">
                            Kirim Jawaban Evaluasi 🌼
                        </button>
                    </div>
                </div>
            </form>
        </main>
    </div>

    <!-- SCRIPT UTAMA KUSTOMISASI DIBERSIHKAN DARI ERROR -->
    <script>
        // Helper Render HTML Gambar Lembar Soal (Aman dari error tipe data string/objek)
        window.renderQuestionImageHTML = function(imgData) {
            if (!imgData) return '';

            let imgSrc = '';
            let customWidth = 'max-w-md';
            let customAlign = 'mx-auto block';

            if (typeof imgData === 'string') {
                imgSrc = imgData;
            } else if (typeof imgData === 'object' && imgData.src) {
                imgSrc = imgData.src;
                if (imgData.width) customWidth = imgData.width;
                if (imgData.align) customAlign = imgData.align;
            }

            if (!imgSrc) return '';

            return `
                <div class="w-full overflow-hidden my-3 clear-both">
                    <img src="${imgSrc}" class="question-image ${customWidth} ${customAlign}" alt="Lampiran Soal" onerror="this.parentElement.style.display='none';">
                </div>
            `;
        };

        // Fungsi Memuat Soal yang Diperbaiki
        window.loadQuizQuestions = function(selectedTopic) {
            const displayTitle = document.getElementById("displaySheetTitle");
            displayTitle.innerText = `Tema: ${selectedTopic}`;
            displayTitle.classList.remove("hidden");

            const activePg = (window.questionsPg || []).filter(q => q.active !== false && (selectedTopic === "All data" || q.topic === selectedTopic));
            const activeEssay = (window.questionsEssay || []).filter(q => q.active !== false && (selectedTopic === "All data" || q.topic === selectedTopic));

            const pgContainer = document.getElementById("pgContainer");
            if (activePg.length === 0) {
                pgContainer.innerHTML = `<p class="text-xs text-gray-400 italic bg-white p-4 rounded-xl border border-rose-100">Belum ada soal PG aktif pada tema ini.</p>`;
            } else {
                pgContainer.innerHTML = activePg.map((q, idx) => `
                    <div class="bg-white p-5 rounded-2xl shadow-xs border border-rose-100/60 space-y-3 overflow-hidden">
                        <div class="flex justify-between items-center text-xs font-semibold text-gray-400">
                            <span>Soal ${idx + 1} dari ${activePg.length} &bull; <strong class="text-rose-600">${q.topic}</strong></span>
                            <span class="text-rose-500 font-bold bg-rose-50 px-2 py-0.5 rounded-md">Bobot: ${q.weight || 10} Poin</span>
                        </div>

                        <!-- DIBERSIHKAN: PENANGANAN GAMBAR SOAL PG -->
                        ${window.renderQuestionImageHTML(q.img)}

                        <p class="text-sm font-semibold text-gray-800 leading-relaxed">${q.text}</p>
                        <div class="space-y-2 pt-1">
                            ${(q.options || []).map(opt => `
                                <label class="flex items-center gap-3 p-3 rounded-xl border border-gray-100 hover:bg-rose-50/30 cursor-pointer transition-all">
                                    <input type="radio" name="pg-${q.id}" value="${opt.k}" required class="accent-rose-500">
                                    <span class="text-xs font-bold text-rose-600 bg-rose-50 px-2.5 py-1 rounded-md">${opt.k}</span>
                                    <span class="text-xs font-medium text-gray-700 ${opt.arabic ? 'arabic ml-auto' : ''}">${opt.t}</span>
                                </label>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }

            const essaySection = document.getElementById("studentEssaySection");
            const essayContainer = document.getElementById("essayContainer");

            if (activeEssay.length === 0) {
                essaySection.classList.add("hidden");
                essayContainer.innerHTML = "";
            } else {
                essaySection.classList.remove("hidden");
                essayContainer.innerHTML = activeEssay.map((q, idx) => `
                    <div class="bg-white p-5 rounded-2xl shadow-xs border border-rose-100/60 space-y-3 overflow-hidden">
                        <div class="flex justify-between items-center text-xs font-semibold text-gray-400">
                            <span>Uraian Soal ${idx + 1} dari ${activeEssay.length} &bull; <strong class="text-rose-600">${q.topic}</strong></span>
                            <span class="text-amber-600 font-bold bg-amber-50 px-2 py-0.5 rounded-md">Maks. Bobot: ${q.weight || 10} Poin</span>
                        </div>

                        <!-- DIBERSIHKAN: PENANGANAN GAMBAR SOAL ESAI -->
                        ${window.renderQuestionImageHTML(q.img)}

                        <p class="text-sm font-semibold text-gray-800 leading-relaxed">${q.text}</p>
                        <textarea id="essay-${q.id}" required rows="4" placeholder="Ketikkan jawaban Anda secara rinci di sini..." class="w-full px-4 py-3 border border-rose-200/60 rounded-xl text-xs sm:text-sm focus:outline-none focus:border-rose-400 bg-rose-50/10 placeholder-gray-400"></textarea>
                    </div>
                `).join('');
            }
        };
    </script>
</body>
</html>
